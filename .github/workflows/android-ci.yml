name: Android CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_instrumentation:
        description: Run connected Android tests on an API 35 emulator
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wrapper-validation:
    name: Validate Gradle wrapper
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Validate wrapper files
        uses: gradle/actions/wrapper-validation@v4

  build:
    name: Unit tests, lint, and debug APK
    needs: wrapper-validation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 36 SDK components
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests, lint, and build
        run: ./gradlew --no-daemon testDebugUnitTest lintDebug assembleDebug

      - name: Verify packaged permissions
        run: ./scripts/verify_permissions.sh app/build/outputs/apk/debug/app-debug.apk

      - name: Upload debug APK and reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-ci-${{ github.run_number }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/reports/lint-results-debug.html
            app/build/reports/tests/testDebugUnitTest/
            app/build/test-results/testDebugUnitTest/

  instrumentation:
    name: Optional emulator tests
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_instrumentation }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 36 SDK components
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run connected tests on API 35
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          disk-size: 4096M
          script: ./gradlew --no-daemon connectedDebugAndroidTest

      - name: Upload instrumentation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumentation-${{ github.run_number }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            app/build/reports/androidTests/connected/
            app/build/outputs/androidTest-results/connected/
