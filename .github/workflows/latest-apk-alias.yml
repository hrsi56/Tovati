name: Keep latest APK alias

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to refresh, for example v1.6.1
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-stable-alias:
    name: Publish Tovati.apk alias
    if: ${{ github.event_name == 'workflow_dispatch' || !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - name: Copy the versioned APK to the stable download name
        shell: bash
        run: |
          set -euo pipefail

          source_asset="$(
            gh release view "$RELEASE_TAG" \
              --json assets \
              --jq '.assets[].name | select(test("^Tovati-[0-9].*\\.apk$"))' \
              | head -n 1
          )"

          if [[ -z "$source_asset" ]]; then
            echo "No versioned Tovati APK found on release $RELEASE_TAG" >&2
            exit 1
          fi

          mkdir -p release-assets
          gh release download "$RELEASE_TAG" --pattern "$source_asset" --dir release-assets
          cp "release-assets/$source_asset" release-assets/Tovati.apk
          gh release upload "$RELEASE_TAG" release-assets/Tovati.apk --clobber

      - name: Verify the public latest-download URL
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            --output downloaded-latest.apk \
            "https://github.com/$GH_REPO/releases/latest/download/Tovati.apk"
          test -s downloaded-latest.apk
          cmp --silent release-assets/Tovati.apk downloaded-latest.apk
